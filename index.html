<title>Защищённая страница</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.lock-card { background: #fff; border-radius: 16px; padding: 40px 32px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); text-align: center; max-width: 360px; width: 90%; }
.lock-icon { font-size: 48px; margin-bottom: 16px; }
.lock-card h2 { font-size: 1.2em; margin-bottom: 8px; color: #1a1a1a; }
.lock-card p { font-size: 0.85em; color: #666; margin-bottom: 24px; }
.lock-card input { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 1em; outline: none; transition: border 0.2s; }
.lock-card input:focus { border-color: #3b82f6; }
.lock-card button { width: 100%; padding: 12px; background: #3b82f6; color: #fff; border: none; border-radius: 8px; font-size: 1em; font-weight: 600; cursor: pointer; margin-top: 12px; transition: background 0.2s; }
.lock-card button:hover { background: #2563eb; }
.error { color: #ef4444; font-size: 0.85em; margin-top: 12px; display: none; }
</style>
</head>

document.getElementById('pw').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') decrypt();
});

async function decrypt() {
  const pw = document.getElementById('pw').value;
  if (!pw) return;
  try {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
    const salt = Uint8Array.from(atob(SALT), c => c.charCodeAt(0));
    const iv = Uint8Array.from(atob(IV), c => c.charCodeAt(0));
    const ct = Uint8Array.from(atob(CT), c => c.charCodeAt(0));
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
      keyMaterial,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );
    const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ct);
    const html = new TextDecoder().decode(decrypted);
    document.open();
    document.write(html);
    document.close();
  } catch(e) {
    document.getElementById('err').style.display = 'block';
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
}
</script>
